<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Generate realistic Indian meal plans from calories, macros, dietary level, and taste preferences."
    />
    <meta name="theme-color" content="#141414" />
    <script>
      (() => {
        const storageKey = "meal-plan-theme";
        const themeColorByMode = { dark: "#141414", light: "#F7F6F2" };
        const isThemePreference = (value) => value === "system" || value === "light" || value === "dark";

        try {
          const storedPreference = window.localStorage.getItem(storageKey);
          const preference = isThemePreference(storedPreference) ? storedPreference : "system";
          const systemTheme = window.matchMedia?.("(prefers-color-scheme: light)").matches ? "light" : "dark";
          const resolvedTheme = preference === "system" ? systemTheme : preference;
          document.documentElement.dataset.theme = resolvedTheme;
          document.documentElement.dataset.themePreference = preference;
          document.querySelector('meta[name="theme-color"]')?.setAttribute("content", themeColorByMode[resolvedTheme]);
        } catch (error) {
          console.warn("Could not apply saved theme preference.", error);
        }
      })();
    </script>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Meal Plan" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Meal Plan Calculator</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="/meal-plan-calculator/assets/index-CyAYeEAj.js"></script>
    <link rel="stylesheet" crossorigin href="/meal-plan-calculator/assets/index-CP-cDFgc.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
